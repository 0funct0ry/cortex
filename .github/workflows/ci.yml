name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'crates/cortex-app/ui/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: crates/cortex-app/ui
        run: npm install

      - name: Frontend Lint
        working-directory: crates/cortex-app/ui
        run: npm run lint

      - name: TypeScript Type-check
        working-directory: crates/cortex-app/ui
        run: npx tsc --noEmit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install System Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Rust Format Check
        run: cargo fmt --all -- --check

      - name: Rust Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Verify IPC Contract Sync
        run: |
          cargo test -p cortex-app
          if [ -n "$(git status --porcelain crates/cortex-app/ui/src/bindings.ts)" ]; then
            echo "Error: IPC bindings are out of sync. Please run 'cargo test -p cortex-app' locally and commit the changes."
            git diff crates/cortex-app/ui/src/bindings.ts
            exit 1
          fi

  test-build:
    name: Test & Build
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'crates/cortex-app/ui/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: crates/cortex-app/ui
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies (Linux only)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev

      - name: Run Tests
        run: cargo test --workspace

      - name: Run Doc Tests
        run: cargo test --doc --workspace

      - name: Build Tauri App (Check)
        run: npm run build --prefix crates/cortex-app/ui && cargo build --release -p cortex-app
